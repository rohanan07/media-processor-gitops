apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-container
          image: media-processor-worker # Placeholder name
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_S3_BUCKET
              value: "media-processor-dev-storage-443245368315"
            - name: DYNAMODB_TABLE
              value: "media-processor-dev-jobs"
            - name: REDIS_URL
              value: "redis://redis-service.dev.svc.cluster.local:6379"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m" # Worker gets more baseline CPU resources for ffmpeg execution
            limits:
              memory: "2Gi"
              cpu: "1000m"